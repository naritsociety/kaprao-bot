name: Deploy Kaprao Bot to DigitalOcean

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-kaprao-bot
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            export PATH="$HOME/.bun/bin:/usr/local/bin:$PATH"

            # Export LINE Secrets เพื่อให้ PM2 อ่านค่าไปใช้ได้
            if [ -n "${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" ]; then
              export LINE_CHANNEL_ACCESS_TOKEN="${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}"
            fi
            
            if [ -n "${{ secrets.LINE_CHANNEL_SECRET }}" ]; then
              export LINE_CHANNEL_SECRET="${{ secrets.LINE_CHANNEL_SECRET }}"
            fi

            cd ~/kaprao-bot
            git pull origin main
            bun install --frozen-lockfile

            if pm2 describe kaprao-api > /dev/null; then
              pm2 restart ecosystem.config.cjs --update-env
            else
              pm2 start ecosystem.config.cjs
            fi

            pm2 save