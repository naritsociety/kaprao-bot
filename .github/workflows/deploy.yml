name: Deploy Kaprao Bot to DigitalOcean

# สั่งให้ทำงานทุกครั้งที่มีการ Push โค้ดเข้า branch "main"
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote ssh commands using ssh key
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          # คำสั่งที่จะให้ไปรันบนเครื่อง DO อัตโนมัติ
          script: |
            export PATH="$HOME/.bun/bin:/usr/local/bin:$PATH"
            cd ~/kaprao-bot
            git pull origin main
            bun install
            pm2 restart kaprao-api